<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>決鬥力場 Duel Field</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.2/peerjs.min.js"></script>
<style>
  :root{
    --bg: #14161b;
    --bg-raised: #1d2027;
    --bg-card: #21242c;
    --line: #32363f;
    --gold: #e3b04b;
    --gold-soft: rgba(227,176,75,0.16);
    --crimson: #d9534f;
    --crimson-soft: rgba(217,83,79,0.18);
    --ink: #ece8dd;
    --ink-dim: #9a9ca3;
    --p1: #ff6a3d;
    --p2: #4fd6e0;
    --good: #6fbf73;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(ellipse 900px 500px at 50% -10%, rgba(227,176,75,0.08), transparent 60%),
      var(--bg);
    color:var(--ink);
    font-family:'Inter','Noto Sans TC',sans-serif;
    min-height:100vh;
  }
  .display{ font-family:'Bebas Neue','Noto Sans TC',sans-serif; letter-spacing:0.04em; }
  .wrap{ max-width:920px; margin:0 auto; padding:28px 18px 64px; }

  /* ---- top banner ---- */
  .banner{ text-align:center; margin-bottom:28px; }
  .banner .eyebrow{ font-size:12px; letter-spacing:0.3em; color:var(--gold); text-transform:uppercase; margin-bottom:6px; }
  .banner h1{ font-size:54px; margin:0; line-height:1; }
  .banner h1 span{ color:var(--gold); }
  .banner p{ color:var(--ink-dim); margin-top:8px; font-size:14px; }

  /* ---- generic panel ---- */
  .panel{ background:var(--bg-raised); border:1px solid var(--line); border-radius:14px; padding:24px; margin-bottom:18px; }
  .panel h2{ font-family:'Bebas Neue'; font-size:26px; letter-spacing:0.03em; margin:0 0 14px; color:var(--ink); }
  .btn{
    font-family:'Inter'; font-weight:700; font-size:14px; letter-spacing:0.02em;
    background:var(--gold); color:#23190a; border:none; border-radius:10px;
    padding:12px 22px; cursor:pointer; transition:transform .12s ease, filter .12s ease;
  }
  .btn:hover{ filter:brightness(1.08); transform:translateY(-1px); }
  .btn:active{ transform:translateY(0); }
  .btn:disabled{ opacity:0.4; cursor:not-allowed; transform:none; }
  .btn.secondary{ background:transparent; color:var(--ink); border:1px solid var(--line); }
  .btn.danger{ background:var(--crimson); color:#fff; }
  .row{ display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
  input[type=text]{
    background:var(--bg-card); border:1px solid var(--line); color:var(--ink);
    border-radius:8px; padding:10px 12px; font-size:14px; flex:1; min-width:160px;
  }
  .hint{ color:var(--ink-dim); font-size:13px; line-height:1.6; }
  .copy-box{ display:flex; gap:8px; align-items:center; }

  /* ---- character cards ---- */
  .char-grid{ display:grid; grid-template-columns:repeat(auto-fit, minmax(220px,1fr)); gap:14px; }
  .char-card{
    background:var(--bg-card); border:1px solid var(--line); border-radius:12px; padding:16px;
    cursor:pointer; transition:border-color .15s ease, transform .12s ease;
  }
  .char-card:hover{ transform:translateY(-2px); }
  .char-card.selected{ border-color:var(--gold); box-shadow:0 0 0 1px var(--gold) inset; }
  .char-card .tag{ font-size:11px; letter-spacing:0.15em; text-transform:uppercase; color:var(--ink-dim); }
  .char-card h3{ font-family:'Bebas Neue'; font-size:28px; margin:4px 0 8px; }
  .char-card .stat{ font-size:12px; color:var(--ink-dim); margin-bottom:3px; }
  .char-card .passive{ margin-top:10px; padding-top:10px; border-top:1px dashed var(--line); font-size:12px; color:var(--ink-dim); }
  .char-card .passive b{ color:var(--ink); }

  .field-grid{ display:grid; grid-template-columns:repeat(auto-fit, minmax(220px,1fr)); gap:14px; }
  .field-card{ background:var(--bg-card); border:1px solid var(--line); border-radius:12px; padding:16px; cursor:pointer; }
  .field-card.selected{ border-color:var(--gold); box-shadow:0 0 0 1px var(--gold) inset; }
  .field-card h3{ font-family:'Bebas Neue'; font-size:24px; margin:0 0 6px; }
  .field-card p{ font-size:12px; color:var(--ink-dim); margin:0; line-height:1.6; }

  /* ---- battle screen ---- */
  .vs-bar{ display:flex; justify-content:space-between; align-items:center; gap:14px; margin-bottom:14px; }
  .pcard{ flex:1; background:var(--bg-raised); border:1px solid var(--line); border-radius:12px; padding:14px 16px; }
  .pcard.p1{ border-top:3px solid var(--p1); }
  .pcard.p2{ border-top:3px solid var(--p2); }
  .pcard .pname{ font-family:'Bebas Neue'; font-size:22px; }
  .pcard .ptag{ font-size:11px; color:var(--ink-dim); letter-spacing:0.1em; text-transform:uppercase; margin-bottom:8px; }
  .barline{ display:flex; align-items:center; gap:8px; font-size:12px; margin:4px 0; }
  .barline .label{ width:34px; color:var(--ink-dim); }
  .bar{ flex:1; height:9px; border-radius:5px; background:#0e0f13; overflow:hidden; border:1px solid var(--line); }
  .bar > div{ height:100%; border-radius:5px; transition:width .3s ease; }
  .bar.hp > div{ background:linear-gradient(90deg, var(--crimson), #f08b6b); }
  .bar.ap > div{ background:linear-gradient(90deg, #4fa6e0, #7fd0e8); }
  .bar.rage > div{ background:linear-gradient(90deg, var(--gold), #f4d27a); }
  .ult-tag{ display:inline-block; margin-top:6px; font-size:11px; color:#23190a; background:var(--gold); padding:2px 8px; border-radius:20px; font-weight:700; }

  .vs-mid{ text-align:center; width:90px; flex-shrink:0; }
  .vs-mid .round{ font-family:'Bebas Neue'; font-size:30px; color:var(--gold); line-height:1; }
  .vs-mid .roundlabel{ font-size:10px; color:var(--ink-dim); letter-spacing:0.2em; }

  /* duel track - signature element */
  .track-wrap{ margin:18px 0 22px; }
  .track{ position:relative; height:64px; border-radius:10px; background:var(--bg-card); border:1px solid var(--line); display:flex; }
  .cell{ flex:1; border-right:1px solid var(--line); position:relative; }
  .cell:last-child{ border-right:none; }
  .cell .cellnum{ position:absolute; bottom:4px; right:6px; font-size:10px; color:#4a4d56; }
  .token{
    position:absolute; top:8px; width:34px; height:34px; border-radius:50%;
    display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:800;
    transition:left .4s cubic-bezier(.2,.8,.3,1); color:#0c0d10;
    box-shadow:0 2px 8px rgba(0,0,0,0.4);
  }
  .token.p1{ background:var(--p1); }
  .token.p2{ background:var(--p2); }
  .distance-tag{ text-align:center; font-size:12px; color:var(--ink-dim); margin-top:6px; }

  /* hand / action area */
  .hand-grid{ display:grid; grid-template-columns:repeat(auto-fit, minmax(160px,1fr)); gap:10px; margin-top:6px; }
  .card{
    background:var(--bg-card); border:1px solid var(--line); border-radius:10px; padding:12px;
    cursor:pointer; transition:border-color .15s, transform .12s;
  }
  .card:hover{ border-color:var(--gold); transform:translateY(-2px); }
  .card.disabled{ opacity:0.35; cursor:not-allowed; transform:none; }
  .card.locked{ opacity:0.25; cursor:not-allowed; border-color:var(--crimson); }
  .card .cname{ font-weight:700; font-size:14px; margin-bottom:4px; }
  .card .clvl{ font-size:10px; color:var(--gold); margin-left:4px; }
  .card .cdesc{ font-size:11px; color:var(--ink-dim); line-height:1.5; }
  .card .cap{ display:inline-block; margin-top:8px; font-size:10px; background:var(--gold-soft); color:var(--gold); padding:2px 7px; border-radius:20px; }
  .card.ultimate{ border-color:var(--gold); background:linear-gradient(180deg, var(--gold-soft), var(--bg-card)); }
  .dir-row{ display:flex; gap:8px; margin-top:8px; }
  .dir-row button{ flex:1; font-size:11px; padding:6px; border-radius:6px; border:1px solid var(--line); background:var(--bg-raised); color:var(--ink); cursor:pointer; }
  .dir-row button:hover{ border-color:var(--gold); }

  .waiting-note{ text-align:center; padding:14px; color:var(--ink-dim); font-size:13px; }

  /* log */
  .log{ max-height:220px; overflow-y:auto; background:#0e0f13; border:1px solid var(--line); border-radius:10px; padding:12px 14px; font-size:12.5px; line-height:1.8; color:var(--ink-dim); }
  .log .l-round{ color:var(--gold); font-weight:700; margin-top:6px; }
  .log .l-hit{ color:var(--ink); }
  .log .l-up{ color:var(--good); }

  .screen{ display:none; }
  .screen.active{ display:block; }
  .center-note{ text-align:center; color:var(--ink-dim); font-size:13px; margin-top:10px; }
  .conn-dot{ display:inline-block; width:8px; height:8px; border-radius:50%; background:var(--ink-dim); margin-right:6px; }
  .conn-dot.on{ background:var(--good); }
  .topline{ display:flex; justify-content:space-between; align-items:center; font-size:12px; color:var(--ink-dim); margin-bottom:10px; }

  @media (max-width:560px){
    .banner h1{ font-size:38px; }
    .vs-bar{ flex-direction:column; }
    .vs-mid{ order:-1; width:auto; }
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="banner">
    <div class="eyebrow">Online Tactical Card Duel</div>
    <h1>決鬥<span>力場</span></h1>
    <p>回合制連線卡牌格鬥・選角色・出萬用牌與技能牌・在場地中決一勝負</p>
  </div>

  <!-- ===== Screen 0: Lobby ===== -->
  <div class="screen active" id="screen-lobby">
    <div class="panel">
      <h2>建立或加入房間</h2>
      <p class="hint">點「建立房間」會產生一條連結，複製傳給朋友，對方點開就會自動連進你的房間（透過 P2P 直連，不需要任何人架伺服器）。</p>
      <div class="row" style="margin-top:14px;">
        <button class="btn" id="btn-host">建立房間（我當房主）</button>
      </div>
      <div id="host-link-area" style="display:none; margin-top:16px;">
        <p class="hint">把這條連結傳給朋友：</p>
        <div class="copy-box">
          <input type="text" id="share-link" readonly>
          <button class="btn secondary" id="btn-copy">複製</button>
        </div>
        <p class="center-note"><span class="conn-dot" id="dot-status"></span><span id="conn-status-text">等待朋友連線中…</span></p>
      </div>
    </div>
    <div class="panel" id="join-panel">
      <h2>或直接貼連結 / 房號加入</h2>
      <div class="row">
        <input type="text" id="join-input" placeholder="貼上朋友傳給你的連結，或房號">
        <button class="btn secondary" id="btn-join">加入</button>
      </div>
      <p class="center-note" id="join-status"></p>
    </div>
  </div>

  <!-- ===== Screen 1: Character Select ===== -->
  <div class="screen" id="screen-select">
    <div class="panel">
      <div class="topline">
        <span><span class="conn-dot on"></span>已連線</span>
        <span id="select-role-label"></span>
      </div>
      <h2>選擇角色</h2>
      <div class="char-grid" id="char-grid"></div>
    </div>
    <div class="panel" id="field-panel" style="display:none;">
      <h2>選擇場地（房主選擇）</h2>
      <div class="field-grid" id="field-grid"></div>
    </div>
    <div class="panel">
      <p class="center-note" id="select-status">請選擇你的角色</p>
      <div class="row" style="justify-content:center; margin-top:8px;">
        <button class="btn" id="btn-start" disabled style="display:none;">開始對戰</button>
      </div>
    </div>
  </div>

  <!-- ===== Screen 2: Battle ===== -->
  <div class="screen" id="screen-battle">
    <div class="panel">
      <div class="vs-bar">
        <div class="pcard p1" id="pcard-p1">
          <div class="ptag">P1</div>
          <div class="pname" id="p1-name">—</div>
          <div class="barline"><span class="label">HP</span><div class="bar hp"><div id="p1-hp-bar" style="width:100%"></div></div><span id="p1-hp-text">0/0</span></div>
          <div class="barline"><span class="label">AP</span><div class="bar ap"><div id="p1-ap-bar" style="width:100%"></div></div><span id="p1-ap-text">0/0</span></div>
          <div class="barline"><span class="label">怒氣</span><div class="bar rage"><div id="p1-rage-bar" style="width:0%"></div></div><span id="p1-rage-text">0</span></div>
          <div id="p1-ult-tag"></div>
        </div>
        <div class="vs-mid">
          <div class="round" id="round-num">1</div>
          <div class="roundlabel">ROUND</div>
        </div>
        <div class="pcard p2" id="pcard-p2">
          <div class="ptag">P2</div>
          <div class="pname" id="p2-name">—</div>
          <div class="barline"><span class="label">HP</span><div class="bar hp"><div id="p2-hp-bar" style="width:100%"></div></div><span id="p2-hp-text">0/0</span></div>
          <div class="barline"><span class="label">AP</span><div class="bar ap"><div id="p2-ap-bar" style="width:100%"></div></div><span id="p2-ap-text">0/0</span></div>
          <div class="barline"><span class="label">怒氣</span><div class="bar rage"><div id="p2-rage-bar" style="width:0%"></div></div><span id="p2-rage-text">0</span></div>
          <div id="p2-ult-tag"></div>
        </div>
      </div>

      <div class="track-wrap">
        <div class="track" id="track"></div>
        <div class="distance-tag" id="distance-tag">距離 0 格 ・ 場地：—</div>
      </div>
    </div>

    <div class="panel" id="action-panel">
      <h2 id="action-title">選擇你的行動</h2>
      <div class="hand-grid" id="hand-grid"></div>
      <p class="waiting-note" id="waiting-note" style="display:none;"></p>
    </div>

    <div class="panel">
      <h2>戰鬥紀錄</h2>
      <div class="log" id="log"></div>
    </div>
  </div>

</div>

<script src="engine.js"></script>
<script>
/* =========================================================================
   PART B — 連線層（PeerJS：免費公開訊號伺服器，瀏覽器之間直接 P2P 連線）
   架構：房主（Host）= 權威端，實際運算整個 Game 狀態；
        加入者（Client）= 只送出自己的選擇，並接收房主廣播的完整狀態來畫面顯示。
   ========================================================================= */
let peer = null, conn = null, isHost = false, myRole = null; // 'p1' = host, 'p2' = joiner
let game = null;
let myChar = null, oppChar = null, oppCharReceived = null, hostFieldChoice = null;
let pendingMyChoice = null;

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function send(type, payload){ if(conn && conn.open) conn.send({type, payload}); }

function setupHost(){
  isHost = true; myRole = 'p1';
  peer = new Peer();
  peer.on('open', id=>{
    const url = new URL(location.href);
    url.search = '?room=' + id;
    document.getElementById('share-link').value = url.toString();
    document.getElementById('host-link-area').style.display = 'block';
  });
  peer.on('connection', c=>{
    conn = c;
    bindConnEvents();
  });
  peer.on('error', err=>{ console.error(err); alert('連線發生錯誤：'+err.type); });
}

function setupJoin(roomId){
  isHost = false; myRole = 'p2';
  peer = new Peer();
  peer.on('open', ()=>{
    conn = peer.connect(roomId, {reliable:true});
    bindConnEvents();
  });
  peer.on('error', err=>{ console.error(err); document.getElementById('join-status').textContent = '連線失敗：'+err.type; });
}

function bindConnEvents(){
  conn.on('open', ()=>{
    document.getElementById('dot-status') && (document.getElementById('dot-status').className='conn-dot on');
    document.getElementById('conn-status-text') && (document.getElementById('conn-status-text').textContent='朋友已連線！');
    startCharacterSelect();
  });
  conn.on('data', onMessage);
  conn.on('close', ()=>{ alert('對方已離線連線中斷。'); });
}

function onMessage(msg){
  const {type, payload} = msg;
  if(type==='char_pick'){
    oppCharReceived = payload.charKey;
    updateSelectStatus();
  } else if(type==='field_pick'){ // client 收到 host 選的場地
    hostFieldChoice = payload.fieldKey;
    tryStartGame();
  } else if(type==='game_start'){ // client 收到完整初始 state
    game = payload.game;
    showScreen('screen-battle');
    renderBattle();
  } else if(type==='action'){ // host 收到 client 的選擇
    pendingOppChoice = payload.choice;
    tryResolveRound();
  } else if(type==='state_update'){ // client 收到 host 結算後的最新狀態
    game = payload.game;
    pendingMyChoice = null; // 回合已經結算完成，清除「已出牌、等待對方」的狀態，否則下一回合會卡住
    renderBattle();
  }
}

/* ---- 角色／場地選擇畫面 ---- */
function startCharacterSelect(){
  showScreen('screen-select');
  document.getElementById('select-role-label').textContent = isHost ? '你是房主（將同時選擇場地）' : '你是加入者';
  const grid = document.getElementById('char-grid');
  grid.innerHTML = '';
  Object.values(CHARACTER_DEFS).forEach(def=>{
    const div = document.createElement('div');
    div.className = 'char-card';
    div.style.borderTopColor = def.color;
    div.innerHTML = `
      <div class="tag">${def.archetype}</div>
      <h3>${def.name}</h3>
      <div class="stat">HP ${def.maxHp}</div>
      <div class="passive"><b>被動・${def.passive.name}</b><br>${def.passive.desc}</div>
    `;
    div.onclick = ()=>{
      document.querySelectorAll('.char-card').forEach(c=>c.classList.remove('selected'));
      div.classList.add('selected');
      myChar = def.id;
      send('char_pick', {charKey: def.id});
      updateSelectStatus();
    };
    grid.appendChild(div);
  });

  if(isHost){
    const fp = document.getElementById('field-panel');
    fp.style.display = 'block';
    const fg = document.getElementById('field-grid');
    fg.innerHTML = '';
    Object.values(FIELD_DEFS).forEach(def=>{
      const div = document.createElement('div');
      div.className = 'field-card';
      div.innerHTML = `<h3>${def.name}</h3><p>${def.desc}</p>`;
      div.onclick = ()=>{
        document.querySelectorAll('.field-card').forEach(c=>c.classList.remove('selected'));
        div.classList.add('selected');
        hostFieldChoice = def.id;
        send('field_pick', {fieldKey: def.id});
        tryStartGame();
      };
      fg.appendChild(div);
    });
    document.getElementById('btn-start').style.display = 'inline-block';
    document.getElementById('btn-start').onclick = tryStartGame;
  }
}
function updateSelectStatus(){
  const s = document.getElementById('select-status');
  if(myChar && oppCharReceived) s.textContent = '雙方角色都已選擇好了！' + (isHost ? '請選擇場地後按「開始對戰」。' : '等待房主選擇場地、開始對戰…');
  else if(myChar) s.textContent = '已選好角色，等待對方選擇…';
  else s.textContent = '請選擇你的角色';
}
function tryStartGame(){
  if(!isHost) return;
  if(!myChar || !oppCharReceived || !hostFieldChoice) return;
  const btn = document.getElementById('btn-start');
  btn.disabled = !(myChar && oppCharReceived && hostFieldChoice);
  if(btn.disabled) return;
  // host: p1 = host自己, p2 = client
  game = createGame(myChar, oppCharReceived, hostFieldChoice);
  send('game_start', {game});
  showScreen('screen-battle');
  renderBattle();
}

/* ---- 戰鬥畫面渲染 ---- */
let pendingOppChoice = null;

function renderBattle(){
  const {p1, p2, field, round, over, winner} = game;
  document.getElementById('round-num').textContent = round;
  document.getElementById('distance-tag').textContent = `距離 ${Math.abs(p1.pos-p2.pos)} 格 ・ 場地：${field.name}`;

  fillPCard('p1', p1);
  fillPCard('p2', p2);

  // track
  const track = document.getElementById('track');
  track.innerHTML = '';
  for(let i=1;i<=field.size;i++){
    const cell = document.createElement('div');
    cell.className = 'cell';
    cell.innerHTML = `<span class="cellnum">${i}</span>`;
    track.appendChild(cell);
  }
  const cellW = 100/field.size;
  const t1 = document.createElement('div');
  t1.className = 'token p1'; t1.textContent='P1';
  t1.style.left = `calc(${(p1.pos-1)*cellW}% + ${cellW/2}% - 17px)`;
  track.appendChild(t1);
  const t2 = document.createElement('div');
  t2.className = 'token p2'; t2.textContent='P2';
  t2.style.top = '8px';
  t2.style.left = `calc(${(p2.pos-1)*cellW}% + ${cellW/2}% - 17px)`;
  track.appendChild(t2);

  // log
  const log = document.getElementById('log');
  log.innerHTML = game.log.map(l=>`<div class="${l.cls||''}">${escapeHtml(l.text)}</div>`).join('');
  log.scrollTop = log.scrollHeight;

  if(over){
    document.getElementById('action-panel').innerHTML = `<h2>對戰結束</h2><p class="center-note" style="font-size:18px; color:var(--gold);">${
      winner==='draw' ? '平手！' : (winner==='p1'? p1.label+'（'+p1.name+'）': p2.label+'（'+p2.name+'）') + ' 獲勝！'
    }</p>`;
    return;
  }

  renderActionPanel();
}

function fillPCard(key, p){
  document.getElementById(`${key}-name`).textContent = `${p.name}（${p.archetype}）`;
  document.getElementById(`${key}-hp-bar`).style.width = (p.hp/p.maxHp*100)+'%';
  document.getElementById(`${key}-hp-text`).textContent = `${p.hp}/${p.maxHp}`;
  document.getElementById(`${key}-ap-bar`).style.width = (p.ap/p.maxAp*100)+'%';
  document.getElementById(`${key}-ap-text`).textContent = `${p.ap}/${p.maxAp}`;
  document.getElementById(`${key}-rage-bar`).style.width = (p.rage/MAX_RAGE*100)+'%';
  document.getElementById(`${key}-rage-text`).textContent = `${p.rage}`;
  document.getElementById(`${key}-ult-tag`).innerHTML = p.ultimateUnlocked ? '<span class="ult-tag">🔥 大招可用</span>' : '';
}

function myPlayer(){ return myRole==='p1' ? game.p1 : game.p2; }
function oppPlayer(){ return myRole==='p1' ? game.p2 : game.p1; }

function renderActionPanel(){
  const me = myPlayer();
  const panel = document.getElementById('hand-grid');
  document.getElementById('action-title').textContent = '選擇你的行動';
  document.getElementById('waiting-note').style.display = 'none';

  if(pendingMyChoice){
    panel.innerHTML = '';
    document.getElementById('action-title').textContent = '已送出行動';
    document.getElementById('waiting-note').style.display = 'block';
    document.getElementById('waiting-note').textContent = '等待對方出牌中…雙方都選完後會自動結算。';
    return;
  }

  if(me.status.cantActThisRound){
    panel.innerHTML = '';
    document.getElementById('waiting-note').style.display = 'block';
    document.getElementById('waiting-note').textContent = '你本回合被封鎖，無法行動。';
    const choice = {kind:'none'};
    submitChoice(choice);
    return;
  }

  panel.innerHTML = '';
  me.hand.forEach(c=>{
    const locked = c.uid === me.status.lockedCardUidThisRound;
    const card = getEffectiveCard(me, c.defId);
    const apCost = getApCost(me, card);
    const affordable = apCost <= me.ap;
    const div = document.createElement('div');
    div.className = 'card' + (locked ? ' locked' : (affordable ? '' : ' disabled'));
    const lvlTag = card.level ? `<span class="clvl">Lv.${card.level}</span>` : '';
    div.innerHTML = `<div class="cname">${card.name}${lvlTag}</div><div class="cdesc">${card.desc}</div><span class="cap">AP ${apCost}</span>`;
    if(locked){
      div.innerHTML += `<div style="margin-top:6px;font-size:10px;color:var(--crimson);">已被對方鎖定</div>`;
    } else if(affordable){
      if(card.needsDirection){
        const dirRow = document.createElement('div');
        dirRow.className = 'dir-row';
        const b1 = document.createElement('button'); b1.textContent='靠近對方';
        const b2 = document.createElement('button'); b2.textContent='遠離對方';
        b1.onclick = (e)=>{ e.stopPropagation(); submitChoice({kind:card.type, cardUid:c.uid, direction:'approach'}); };
        b2.onclick = (e)=>{ e.stopPropagation(); submitChoice({kind:card.type, cardUid:c.uid, direction:'retreat'}); };
        dirRow.appendChild(b1); dirRow.appendChild(b2);
        div.appendChild(dirRow);
      } else {
        div.onclick = ()=> submitChoice({kind:card.type, cardUid:c.uid});
      }
    }
    panel.appendChild(div);
  });

  if(me.ultimateUnlocked){
    const ult = getUltimate(me);
    const div = document.createElement('div');
    div.className = 'card ultimate' + (ult.apCost<=me.ap ? '' : ' disabled');
    div.innerHTML = `<div class="cname">🔥 ${ult.name}</div><div class="cdesc">${ult.desc}</div><span class="cap">AP ${ult.apCost}</span>`;
    if(ult.apCost<=me.ap) div.onclick = ()=> submitChoice({kind:'ultimate'});
    panel.appendChild(div);
  }

  const skipDiv = document.createElement('div');
  skipDiv.className = 'card';
  skipDiv.innerHTML = `<div class="cname">不出牌</div><div class="cdesc">保留資源，本回合不行動</div>`;
  skipDiv.onclick = ()=> submitChoice({kind:'none'});
  panel.appendChild(skipDiv);
}

function submitChoice(choice){
  pendingMyChoice = choice;
  renderActionPanel();
  if(isHost){
    tryResolveRound();
  } else {
    send('action', {choice});
  }
}

function tryResolveRound(){
  if(!isHost) return;
  if(!pendingMyChoice || !pendingOppChoice) return;
  const hostChoice = pendingMyChoice;
  const clientChoice = pendingOppChoice;
  pendingMyChoice = null; pendingOppChoice = null;
  resolveRound(game, hostChoice, clientChoice); // p1=host, p2=client
  send('state_update', {game});
  renderBattle();
}

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

/* =========================================================================
   PART C — 啟動流程
   ========================================================================= */
document.getElementById('btn-host').onclick = ()=>{
  document.getElementById('btn-host').disabled = true;
  document.getElementById('join-panel').style.display = 'none';
  setupHost();
};
document.getElementById('btn-copy').onclick = ()=>{
  const input = document.getElementById('share-link');
  input.select(); document.execCommand('copy');
  const btn = document.getElementById('btn-copy');
  const old = btn.textContent; btn.textContent='已複製！';
  setTimeout(()=>btn.textContent=old, 1500);
};
document.getElementById('btn-join').onclick = ()=>{
  const raw = document.getElementById('join-input').value.trim();
  if(!raw){ return; }
  let roomId = raw;
  try{ const u = new URL(raw); const p = u.searchParams.get('room'); if(p) roomId = p; }catch(e){ /* 不是完整網址，當作純房號處理 */ }
  document.getElementById('join-status').textContent = '連線中…';
  document.getElementById('btn-join').disabled = true;
  setupJoin(roomId);
};

// 若網址帶有 ?room=xxx，自動進入加入流程
(function autoJoinFromUrl(){
  const params = new URLSearchParams(location.search);
  const room = params.get('room');
  if(room){
    document.getElementById('screen-lobby').querySelector('.panel').style.display = 'none';
    document.getElementById('join-input').value = room;
    document.getElementById('join-status').textContent = '偵測到房間連結，連線中…';
    setupJoin(room);
  }
})();
</script>
